<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Holy Bible Reader</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Cinzel:wght@400;600&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ═══════════════════════════════════════════
       STICKY HEADER
  ════════════════════════════════════════════ -->
  <header class="site-header">
    <div class="header-left">
      <!-- Hamburger for mobile -->
      <button class="hamburger-btn" id="hamburgerBtn" aria-label="Toggle sidebar">
        <span></span><span></span><span></span>
      </button>
      <div class="logo">
        <span class="logo-icon">✦</span>
        <span class="logo-text">Holy Bible Reader</span>
      </div>
    </div>

    <div class="header-center">
      <!-- Search Bar -->
      <div class="search-wrapper">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input
          type="text"
          id="searchInput"
          class="search-input"
          placeholder="Search verses…"
          autocomplete="off"
        />
        <button class="search-clear" id="searchClear" aria-label="Clear search">✕</button>
      </div>
    </div>

    <div class="header-right">
      <!-- Font size controls -->
      <div class="font-controls" title="Adjust font size">
        <button id="fontDecrease" class="icon-btn" aria-label="Decrease font">A−</button>
        <button id="fontIncrease" class="icon-btn" aria-label="Increase font">A+</button>
      </div>

      <!-- Bookmarks toggle -->
      <button class="icon-btn bookmark-btn" id="bookmarkToggleBtn" title="View Bookmarks">
        🔖
        <span class="bookmark-count" id="bookmarkCount">0</span>
      </button>

      <!-- Dark mode toggle -->
      <button class="icon-btn theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
        <span class="theme-icon">🌙</span>
      </button>
    </div>
  </header>

  <!-- ═══════════════════════════════════════════
       MAIN LAYOUT
  ════════════════════════════════════════════ -->
  <div class="app-layout">

    <!-- SIDEBAR OVERLAY (mobile) -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="testament-tabs">
          <button class="tab-btn active" data-testament="old">Old Testament</button>
          <button class="tab-btn" data-testament="new">New Testament</button>
        </div>
      </div>

      <nav class="books-nav" id="booksNav" aria-label="Bible books">
        <!-- Populated by JS -->
      </nav>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content" id="mainContent">

      <!-- BREADCRUMB -->
      <nav class="breadcrumb" id="breadcrumb" aria-label="Location">
        <span class="breadcrumb-item home-crumb" id="homeCrumb">☰ Books</span>
      </nav>

      <!-- READING AREA — dynamically swapped between views -->
      <div class="reading-area" id="readingArea">

        <!-- Welcome Screen (default) -->
        <div class="welcome-screen" id="welcomeScreen">
          <div class="welcome-icon">✦</div>
          <h1 class="welcome-title">Welcome to Holy Bible Reader</h1>
          <p class="welcome-sub">Choose a book from the sidebar to begin reading.<br>The Word of God, beautifully presented.</p>
          <div class="welcome-stats" id="welcomeStats"></div>
        </div>

      </div>

    </main>

    <!-- BOOKMARKS PANEL -->
    <aside class="bookmarks-panel" id="bookmarksPanel">
      <div class="bookmarks-header">
        <h2>🔖 Bookmarks</h2>
        <button class="close-btn" id="closeBookmarksBtn">✕</button>
      </div>
      <div class="bookmarks-list" id="bookmarksList">
        <!-- Populated by JS -->
      </div>
    </aside>

  </div>

  <!-- ═══════════════════════════════════════════
       TOAST NOTIFICATION
  ════════════════════════════════════════════ -->
  <div class="toast" id="toast"></div>

  <script src="js/script.js"></script>
</body>
</html>
